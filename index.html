<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDHALGO - Game Petualangan Algoritma</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
            color: #f8fafc;
        }
        .font-mono-tech { font-family: 'JetBrains Mono', monospace; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .grid-cell { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
        .grid-cell.start { background-color: rgba(59, 130, 246, 0.2); }
        .grid-cell.target { background-color: rgba(16, 185, 129, 0.2); }
        .grid-cell.obstacle { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-color: #334155; 
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); 
        }
        .robot { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8)); }
        
        .swal2-popup { background: #1e293b !important; color: #f8fafc !important; border: 1px solid #334155; }
        .swal2-title { color: #f8fafc !important; }
        .swal2-html-container { color: #cbd5e1 !important; }
        .swal2-container { z-index: 9999999 !important; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Auto-scroll active script highlight */
        .script-active { background-color: rgba(51, 65, 85, 0.8) !important; border-left: 3px solid #3b82f6; }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen relative pb-16"></div>
    
    <div class="fixed bottom-0 w-full bg-slate-900/80 backdrop-blur text-slate-400 text-xs text-center py-2 border-t border-slate-800 z-50">
        &copy; 2026 ANDHALGO - Hak Cipta oleh <b>Andhi Asmara Hadi</b>. All rights reserved.
    </div>

    <script>
        // KONFIGURASI APLIKASI
        const IS_PREVIEW = false; // Set ke false jika dihubungkan ke GAS
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxaKJl3rblagtAQqlhuEiKZuXvBkvid-JgbHLM_KnTC1ngZbc4-4MXtxhRvL8ImZRhUHg/exec";

        const app = {
            user: null, 
            view: 'login', 
            helpTokens: 3, 
            levels: [
                { id: 1, name: "Langkah Awal", grid: 5, start: {x:0, y:4, dir:0}, target: {x:0, y:1}, obstacles: [], maxBlocks: 4, 
                  desc: "Maju perlahan menuju bendera.", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li>Forward (Maju)</li><li>Forward (Maju)</li><li>Forward (Maju)</li></ol>" },
                { id: 2, name: "Belok Kanan", grid: 5, start: {x:0, y:4, dir:0}, target: {x:3, y:1}, obstacles: [{x:1,y:2}, {x:2,y:2}], maxBlocks: 8, 
                  desc: "Belok untuk menghindari tembok di tengah jalan.", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li>Forward (Maju) 3x</li><li>Right (Kanan)</li><li>Forward (Maju) 3x</li></ol>" },
                { id: 3, name: "Sihir Perulangan (FOR)", grid: 6, start: {x:0, y:5, dir:1}, target: {x:5, y:5}, obstacles: [], maxBlocks: 3, 
                  desc: "Gunakan FOR agar tidak lelah mengetik maju berulang kali.", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>FOR Nx</b> (Isi angka 5)</li><li>Forward (Maju)</li><li><b>TUTUP BLOK</b></li></ol>" },
                { id: 4, name: "Pola Tangga", grid: 6, start: {x:0, y:5, dir:0}, target: {x:3, y:2}, obstacles: [{x:1,y:4}, {x:2,y:3}], maxBlocks: 6, 
                  desc: "Ada pola gerakan yang berulang di sini. Manfaatkan blok FOR!", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>FOR Nx</b> (Isi angka 3)</li><li>Forward (Maju)</li><li>Right (Kanan)</li><li>Forward (Maju)</li><li>Left (Kiri)</li><li><b>TUTUP BLOK</b></li></ol>" },
                { id: 5, name: "Maju Otomatis (WHILE)", grid: 7, start: {x:0, y:6, dir:1}, target: {x:6, y:6}, obstacles: [], maxBlocks: 3, 
                  desc: "Selama jalanan di depanmu kosong, teruslah melangkah!", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>WHILE</b> (Depan Kosong)</li><li>Forward (Maju)</li><li><b>TUTUP BLOK</b></li></ol>" },
                { id: 6, name: "Logika Mentok (IF)", grid: 6, start: {x:0, y:5, dir:0}, target: {x:5, y:0}, obstacles: [{x:1,y:5},{x:1,y:4},{x:1,y:3},{x:1,y:2},{x:1,y:1},{x:2,y:1},{x:3,y:1},{x:4,y:1}], maxBlocks: 6, 
                  desc: "Jalur berbentuk 'L'. Cek apakah depanmu tembok (IF) sebelum berbelok.", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>REPEAT</b> (Terus)</li><li><b>IF</b> (Mentok Depan)</li><li>Right (Kanan)</li><li><b>TUTUP BLOK</b> (Tutup IF)</li><li>Forward (Maju)</li><li><b>TUTUP BLOK</b> (Tutup REPEAT)</li></ol>" },
                { id: 7, name: "Labirin Spiral", grid: 7, start: {x:6, y:6, dir:3}, target: {x:3, y:3}, obstacles: [{x:1,y:5},{x:2,y:5},{x:3,y:5},{x:4,y:5},{x:5,y:5}, {x:1,y:1},{x:2,y:1},{x:3,y:1},{x:4,y:1},{x:5,y:1}, {x:1,y:2},{x:1,y:3},{x:1,y:4}, {x:5,y:2},{x:5,y:3}], maxBlocks: 6, 
                  desc: "Terapkan kode yang persis sama dengan Level 6, dan lihat keajaiban Wall-Follower!", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>REPEAT</b> (Terus)</li><li><b>IF</b> (Mentok Depan)</li><li>Right (Kanan)</li><li><b>TUTUP BLOK</b> (Tutup IF)</li><li>Forward (Maju)</li><li><b>TUTUP BLOK</b> (Tutup REPEAT)</li></ol>" },
                { id: 8, name: "Rintangan (Lompat)", grid: 7, start: {x:0, y:3, dir:1}, target: {x:6, y:3}, obstacles: [{x:1,y:3}, {x:3,y:3}, {x:5,y:3}], maxBlocks: 4, 
                  desc: "Tembok ini bisa dilompati. Gunakan perintah Jump!", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>FOR Nx</b> (Isi angka 3)</li><li>Jump (Lompat)</li><li><b>TUTUP BLOK</b></li></ol>" },
                { id: 9, name: "Parkour Pola (Kombinasi)", grid: 7, start: {x:0, y:6, dir:1}, target: {x:6, y:0}, obstacles: [{x:1,y:6}, {x:2,y:5}, {x:3,y:4}, {x:4,y:3}, {x:5,y:2}, {x:6,y:1}], maxBlocks: 7, 
                  desc: "Lompat, belok kiri, lompat, belok kanan. Bisakah kamu memampatkannya?", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>FOR Nx</b> (Isi angka 3)</li><li>Jump (Lompat)</li><li>Left (Kiri)</li><li>Jump (Lompat)</li><li>Right (Kanan)</li><li><b>TUTUP BLOK</b></li></ol>" },
                { id: 10, name: "Ujian Master", grid: 7, start: {x:0, y:6, dir:0}, target: {x:0, y:0}, obstacles: [{x:0,y:5}, {x:0,y:3}, {x:0,y:1}], maxBlocks: 6, 
                  desc: "Tantangan akhir! Lompat berkali-kali sampai garis akhir.", 
                  solutionHint: "<ol class='list-decimal pl-5 mt-2 space-y-1 text-sm'><li><b>FOR Nx</b> (Isi angka 3)</li><li>Jump (Lompat)</li><li><b>TUTUP BLOK</b></li></ol>" }
            ],
            currentGame: { level: null, commands: [], pos: {x:0, y:0, dir:0}, isPlaying: false },
            dummyUsers: [
                { id: 1, username: 'admin', password: 'edudigital', role: 'guru', nama: 'Andhi Asmara Hadi', kelas: '-', tahun_pelajaran: '-' },
                { id: 2, username: 'peserta', password: 'edudigital', role: 'siswa', nama: 'Siswa Contoh', kelas: '9A', tahun_pelajaran: '2025/2026' }
            ],
            dummyProgress: [],
            dummyProgressInit: false,
            adminData: []
        };

        async function requestGAS(action, data) {
            // Simulator Backend lokal untuk preview mode
            if (IS_PREVIEW) {
                if (!app.dummyProgressInit) {
                    const stored = localStorage.getItem('andhalgo_dummy_prog');
                    if (stored) app.dummyProgress = JSON.parse(stored);
                    app.dummyProgressInit = true;
                }
                
                return new Promise(resolve => {
                    setTimeout(() => {
                        let res = { status: 'error', message: 'Action not found' };
                        try {
                            if (action === 'login') {
                                const user = app.dummyUsers.find(u => u.username === data.username && u.password === data.password);
                                if (user) res = { status: 'success', data: { username: user.username, role: user.role, nama: user.nama, kelas: user.kelas } };
                                else res = { status: 'error', message: 'Username atau password salah!' };
                            } 
                            else if (action === 'getStudentStats') {
                                const stats = app.dummyUsers.filter(u => u.role === 'siswa').map(u => {
                                    const prog = app.dummyProgress.filter(p => p.username === u.username);
                                    const maxLevel = prog.length > 0 ? Math.max(...prog.map(p => parseInt(p.level_diselesaikan))) : 0;
                                    const totalScore = prog.reduce((sum, p) => sum + parseInt(p.skor_diperoleh), 0);
                                    const detailSkor = {};
                                    prog.forEach(p => detailSkor[p.level_diselesaikan] = parseInt(p.skor_diperoleh));
                                    return { username: u.username, nama: u.nama, kelas: u.kelas, tahun_pelajaran: u.tahun_pelajaran || '2025/2026', maxLevel, totalScore, detailSkor };
                                });
                                res = { status: 'success', data: stats };
                            }
                            else if (action === 'uploadStudentsBulk') {
                                data.forEach(siswa => {
                                    if(!app.dummyUsers.find(x => x.username === String(siswa.Username))){
                                        app.dummyUsers.push({ id: Date.now()+Math.random(), username: String(siswa.Username), password: String(siswa.Password), role: 'siswa', nama: siswa['Nama Lengkap'], kelas: String(siswa.Kelas), tahun_pelajaran: String(siswa['Tahun Pelajaran']) });
                                    }
                                });
                                res = { status: 'success', message: 'Berhasil upload data siswa' };
                            }
                            else if (action === 'getStudentProgress') {
                                const prog = app.dummyProgress.filter(p => p.username === data.username);
                                res = { status: 'success', data: prog };
                            }
                            else if (action === 'saveProgress') {
                                const existingIdx = app.dummyProgress.findIndex(p => String(p.username) === String(data.username) && parseInt(p.level_diselesaikan) === parseInt(data.level));
                                if (existingIdx >= 0) {
                                    if (parseInt(data.skor) > parseInt(app.dummyProgress[existingIdx].skor_diperoleh)) {
                                        app.dummyProgress[existingIdx].skor_diperoleh = parseInt(data.skor); 
                                    }
                                } else {
                                    app.dummyProgress.push({ username: String(data.username), level_diselesaikan: parseInt(data.level), skor_diperoleh: parseInt(data.skor) });
                                }
                                localStorage.setItem('andhalgo_dummy_prog', JSON.stringify(app.dummyProgress)); 
                                res = { status: 'success', message: 'Progress disimpan.' };
                            }
                            else if (action === 'resetProgress') {
                                app.dummyProgress = app.dummyProgress.filter(p => p.username !== data.username);
                                localStorage.setItem('andhalgo_dummy_prog', JSON.stringify(app.dummyProgress));
                                res = { status: 'success', message: 'Progres direset' };
                            }
                        } catch(err) {
                            res = { status: 'error', message: err.message };
                        }
                        resolve(res);
                    }, 500);
                });
            } else {
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: action, data: data }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    return await response.json();
                } catch (err) {
                    console.error("Fetch Error:", err);
                    return { status: 'error', message: 'Gagal menghubungi server database.' };
                }
            }
        }

        app.renderApp = function() {
            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            if (app.user) {
                const nav = document.createElement('nav');
                nav.className = 'glass-panel text-white p-4 flex justify-between items-center sticky top-0 z-40 border-b border-slate-700';
                nav.innerHTML = `
                    <div class="font-bold text-xl flex items-center gap-3">
                        <img src="https://i.imghippo.com/files/aAR4728vDI.png" class="h-10 w-auto object-contain drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]" alt="Logo">
                    </div>
                    <div class="flex items-center gap-4 text-sm font-semibold">
                        <div class="hidden sm:flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center border border-blue-400 shadow-[0_0_10px_rgba(37,99,235,0.5)]">
                                <i class="fa-solid fa-user"></i>
                            </div> 
                            <span class="text-blue-200">${app.user.nama}</span>
                        </div>
                        <button onclick="app.logout()" class="bg-slate-800 hover:bg-slate-700 text-red-400 px-4 py-2 rounded-lg border border-slate-600 transition shadow-lg">
                            <i class="fa-solid fa-power-off"></i>
                        </button>
                    </div>
                `;
                container.appendChild(nav);
            }

            const main = document.createElement('main');
            main.className = 'p-4 md:p-8 max-w-7xl mx-auto';
            container.appendChild(main);

            if (app.view === 'login') renderLogin(main);
            else if (app.view === 'student-dash') renderStudentDash(main);
            else if (app.view === 'admin-dash') renderAdminDash(main);
            else if (app.view === 'game') renderGame(main);
        };

        app.changeView = function(viewName) { app.view = viewName; app.renderApp(); };
        app.logout = function() { app.user = null; app.helpTokens = 3; app.changeView('login'); };

        function renderLogin(container) {
            container.innerHTML = `
            <div class="max-w-4xl mx-auto glass-panel rounded-3xl overflow-hidden mt-10 sm:mt-16 transform transition-all flex flex-col md:flex-row shadow-[0_0_40px_rgba(0,0,0,0.6)] border border-slate-700">
                
                <!-- Bagian Kiri: Logo -->
                <div class="w-full md:w-1/2 bg-slate-900/60 p-10 flex flex-col justify-center items-center relative overflow-hidden border-b md:border-b-0 md:border-r border-slate-700/50">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-900/30 to-transparent"></div>
                    <img src="https://i.imghippo.com/files/SYf1057aMI.png" class="w-48 sm:w-56 h-auto relative z-10 drop-shadow-[0_0_25px_rgba(59,130,246,0.5)] hover:scale-105 transition-transform duration-500" alt="Andhalgo Logo" onerror="this.style.display='none'">
                    <div class="relative z-10 mt-8 text-center">
                        <h1 class="text-3xl font-black text-white tracking-tight drop-shadow-md">ANDHALGO</h1>
                        <p class="text-blue-400 text-xs font-mono-tech tracking-widest uppercase mt-2">Sistem Logika & Algoritma</p>
                    </div>
                </div>

                <!-- Bagian Kanan: Form Login -->
                <div class="w-full md:w-1/2 p-8 sm:p-12 bg-slate-800/40 flex flex-col justify-center relative">
                    <div class="mb-8 text-left">
                        <h2 class="text-white font-bold text-2xl tracking-tight flex items-center gap-2"><i class="fa-solid fa-fingerprint text-blue-500"></i> Login Portal</h2>
                        <p class="text-slate-400 text-sm mt-2">Masukkan kredensial akses Anda.</p>
                    </div>
                    
                    <form id="login-form" class="space-y-5">
                        <div>
                            <div class="mt-1 relative rounded-lg shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fa-solid fa-terminal text-blue-400"></i></div>
                                <input type="text" id="login-username" required class="w-full pl-12 p-3.5 bg-slate-900/80 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white outline-none placeholder-slate-400 transition text-sm shadow-inner" placeholder="Username / ID">
                            </div>
                        </div>
                        <div>
                            <div class="mt-1 relative rounded-lg shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-blue-400"></i></div>
                                <input type="password" id="login-password" required class="w-full pl-12 p-3.5 bg-slate-900/80 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white outline-none placeholder-slate-400 transition text-sm shadow-inner" placeholder="Password Access">
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_8px_20px_rgba(79,70,229,0.4)] hover:shadow-[0_12px_25px_rgba(79,70,229,0.6)] transition-all transform hover:-translate-y-0.5 flex justify-center items-center gap-2 text-sm tracking-wide">
                            <i class="fa-solid fa-rocket"></i> INITIALIZE
                        </button>
                    </form>
                    
                    <div class="mt-10 text-center text-[11px] sm:text-xs text-slate-500 font-mono-tech border-t border-slate-700/50 pt-5">
                        // Akses Terbatas //<br>Hanya untuk pengguna yang telah terdaftar.
                    </div>
                </div>
            </div>
            `;
            
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    const u = document.getElementById('login-username').value;
                    const p = document.getElementById('login-password').value;
                    Swal.fire({ title: 'Authenticating...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    const res = await requestGAS('login', { username: u, password: p });
                    if (res.status === 'success') {
                        app.user = res.data; app.helpTokens = 3;
                        Swal.close();
                        if (app.user.role === 'guru') app.changeView('admin-dash'); else app.changeView('student-dash');
                    } else Swal.fire('Akses Ditolak', res.message, 'error');
                } catch(error) {
                    Swal.fire('Error', 'Terjadi kesalahan sistem saat login.', 'error');
                }
            });
        }

        async function renderStudentDash(container) {
            container.innerHTML = `<div class="text-center my-20"><i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500"></i><p class="mt-4 text-blue-300 font-mono-tech">Memuat Data Server...</p></div>`;
            
            try {
                const res = await requestGAS('getStudentProgress', { username: app.user.username });
                const progress = res.status === 'success' ? res.data : [];
                const maxLevelCleared = progress.length > 0 ? Math.max(...progress.map(p => parseInt(p.level_diselesaikan))) : 0;
                const totalScore = progress.reduce((sum, p) => sum + parseInt(p.skor_diperoleh), 0);

                let levelsHtml = '';
                app.levels.forEach((lvl, index) => {
                    const isUnlocked = index === 0 || lvl.id <= maxLevelCleared + 1;
                    const isCleared = lvl.id <= maxLevelCleared;
                    const progData = progress.find(p => parseInt(p.level_diselesaikan) === lvl.id);
                    const score = progData ? progData.skor_diperoleh : 0;
                    
                    const bgClass = isUnlocked ? (isCleared ? 'bg-emerald-900/40 border-emerald-500/50' : 'glass-panel border-blue-400/50') : 'bg-slate-800/30 border-slate-700/50 opacity-50 grayscale';
                    const icon = isUnlocked ? (isCleared ? '<i class="fa-solid fa-circle-check text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.8)]"></i>' : '<i class="fa-solid fa-play text-blue-400 drop-shadow-[0_0_5px_rgba(96,165,250,0.8)]"></i>') : '<i class="fa-solid fa-lock text-slate-500"></i>';
                    
                    levelsHtml += `
                    <div class="${bgClass} border rounded-2xl p-5 transition-all duration-300 ${isUnlocked ? 'cursor-pointer hover:-translate-y-2 hover:shadow-[0_10px_20px_rgba(59,130,246,0.2)]' : ''}" ${isUnlocked ? `onclick="app.startGame(${lvl.id})"` : ''}>
                        <div class="flex justify-between items-start mb-3">
                            <div class="font-bold text-xl text-white font-mono-tech">Level ${lvl.id}</div>
                            <div class="text-3xl">${icon}</div>
                        </div>
                        <div class="text-sm font-semibold text-blue-200 mb-2">${lvl.name}</div>
                        <div class="text-xs text-slate-400 h-10">${isUnlocked ? lvl.desc : 'Terkunci. Selesaikan level sebelumnya.'}</div>
                        ${isUnlocked ? `<div class="mt-4 pt-3 border-t border-slate-700/50 text-xs font-bold font-mono-tech ${isCleared ? 'text-emerald-400' : 'text-slate-500'}">HIGH SCORE: ${score}</div>` : ''}
                    </div>
                    `;
                });

                container.innerHTML = `
                <div class="relative rounded-3xl p-8 mb-10 overflow-hidden shadow-[0_0_30px_rgba(30,58,138,0.5)] border border-blue-500/30">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-indigo-900 to-slate-900"></div>

        app.downloadTemplate = function() {
            try {
                const wsData = [ ["Nama Lengkap", "Kelas", "Tahun Pelajaran", "Username", "Password"], ["Siswa Contoh", "9A", "2025/2026", "siswa1", "12345"] ];
                const ws = XLSX.utils.aoa_to_sheet(wsData); const wb = XLSX.utils.book_new();

        app.handleFileUpload = function(event) {
            const file = event.target.files[0]; if(!file) return;
            Swal.fire({ title: 'Membaca File...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    if(jsonData.length === 0) { Swal.fire('Error', 'File kosong!', 'error'); return; }
                    const reqKeys = ["Nama Lengkap", "Kelas", "Tahun Pelajaran", "Username", "Password"];
                    if(!reqKeys.every(k => Object.keys(jsonData[0]).includes(k))) { Swal.fire('Format Salah', 'Header harus sama dengan template!', 'error'); return; }
                    const res = await requestGAS('uploadStudentsBulk', jsonData);
                    if(res.status === 'success') Swal.fire('Berhasil!', `Data diunggah.`, 'success').then(() => app.changeView('admin-dash'));
                    else Swal.fire('Gagal', res.message, 'error');
                } catch (err) { Swal.fire('Error', 'Gagal membaca format .xlsx', 'error'); }
            };
            reader.onerror = function() {
                Swal.fire('Error', 'Terjadi kesalahan saat membaca file fisik.', 'error');
            };
            reader.readAsArrayBuffer(file); event.target.value = ''; 
        };

                            <button onclick="app.addCommand('BLOCK_IF')" class="bg-slate-800 hover:bg-pink-600/50 text-pink-400 hover:text-pink-300 p-2.5 rounded-lg border border-slate-600 hover:border-pink-500 text-xs font-bold transition flex items-center justify-center gap-2 col-span-2"><i class="fa-solid fa-code-branch"></i> IF (Mentok Depan)</button>
                        </div>
                        <button onclick="app.addCommand('END_BLOCK')" class="w-full bg-slate-900 text-slate-500 p-2.5 rounded-lg border border-slate-700 border-dashed text-xs font-bold hover:text-slate-300 hover:border-slate-500 transition flex justify-center items-center gap-2 mt-1"><i class="fa-solid fa-level-up-alt"></i> } TUTUP BLOK</button>
                    </div>
                    
                    <!-- Script Window -->
                    <div class="w-full lg:w-1/2 glass-panel p-4 rounded-2xl flex-1 flex flex-col border border-slate-700 min-h-[250px]">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold text-blue-300 font-mono-tech flex items-center gap-2"><i class="fa-solid fa-terminal"></i> script.js 
                                <span id="block-counter" class="text-[10px] bg-blue-900/50 text-blue-300 px-2 py-0.5 rounded border border-blue-500/30 ml-2">0/Max</span>
                            </h3>
                            <button onclick="app.clearCommands()" class="text-red-400 hover:text-red-300 text-xs font-bold transition"><i class="fa-solid fa-trash-can"></i> Clear</button>
                        </div>
                        <div id="command-list" class="flex-1 bg-slate-950 rounded-xl border border-slate-800 p-3 overflow-y-auto max-h-[300px] flex flex-col gap-1.5 font-mono-tech text-sm shadow-inner scroll-smooth"></div>
                        <button onclick="app.runCode()" id="btn-run" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] transition flex items-center justify-center gap-2 text-lg relative z-20">
                            <i class="fa-solid fa-play"></i> COMPILE & RUN
                        </button>
                    </div>
                </div>
            </div>
            `;
            app.drawBoard(); app.renderCommands();
        }

        app.drawBoard = function() {
            const board = document.getElementById('game-board'); if(!board) return;
            const lvl = app.currentGame.level; const pos = app.currentGame.pos;
            board.style.display = 'grid'; board.style.gridTemplateColumns = `repeat(${lvl.grid}, 40px)`; board.style.gridTemplateRows = `repeat(${lvl.grid}, 40px)`; board.innerHTML = '';
            for (let y = 0; y < lvl.grid; y++) {
                for (let x = 0; x < lvl.grid; x++) {
                    const cell = document.createElement('div'); cell.className = 'grid-cell';
                    if (x === lvl.start.x && y === lvl.start.y) cell.classList.add('start');
                    if (x === lvl.target.x && y === lvl.target.y) { cell.classList.add('target'); cell.innerHTML = '<i class="fa-solid fa-flag-checkered text-emerald-400 drop-shadow"></i>'; }
                    if (lvl.obstacles.some(ob => ob.x === x && ob.y === y)) cell.classList.add('obstacle');
                    if (x === pos.x && y === pos.y) cell.innerHTML = `<i class="fa-solid fa-robot text-blue-400 text-2xl robot" style="transform: rotate(${pos.dir * 90}deg);"></i>`;
                    board.appendChild(cell);
                }
            }
        };

        app.addCommand = function(cmd) {
            if (app.currentGame.isPlaying) return;
            const max = app.currentGame.level.maxBlocks;
            if (app.currentGame.commands.length >= max) { Swal.fire({ icon: 'warning', title: 'Memory Full!', text: `Hanya diizinkan ${max} baris kode. Gunakan Loop!`}); return; }
            if (cmd === 'END_BLOCK' && app.currentGame.commands.filter(c => c.startsWith('BLOCK_')).length <= app.currentGame.commands.filter(c => c === 'END_BLOCK').length) { Swal.fire({icon: 'info', title: 'Oops!', text: 'Tidak ada blok yang terbuka.'}); return; }
            app.currentGame.commands.push(cmd); app.renderCommands();
            
            setTimeout(() => {
                const cl = document.getElementById('command-list');
                if(cl) cl.scrollTop = cl.scrollHeight;
            }, 50);
        };

        app.clearCommands = function() { if (app.currentGame.isPlaying) return; app.currentGame.commands = []; app.currentGame.pos = { ...app.currentGame.level.start }; app.drawBoard(); app.renderCommands(); };
        app.removeCommand = function(index) { if (app.currentGame.isPlaying) return; app.currentGame.commands.splice(index, 1); app.renderCommands(); };

        app.promptForLoop = function() {
            if (app.currentGame.isPlaying) return;
            Swal.fire({ title: 'Set Parameter N', input: 'number', inputAttributes: { min: 2, max: 50, step: 1 }, inputValue: 3, showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'Submit' })
            .then((r) => { if (r.isConfirmed && r.value) app.addCommand('BLOCK_FOR_' + r.value); }).catch(err => console.error(err));
        };

        app.renderCommands = function() {
            const list = document.getElementById('command-list'); const counter = document.getElementById('block-counter'); if(!list || !counter) return;
            const cur = app.currentGame.commands.length; const max = app.currentGame.level.maxBlocks;
            counter.innerText = `${cur}/${max}`; counter.className = `text-[10px] px-2 py-0.5 rounded border ml-2 ${cur >= max ? 'bg-red-900/50 text-red-300 border-red-500/30' : 'bg-blue-900/50 text-blue-300 border-blue-500/30'}`;
            if (cur === 0) { list.innerHTML = '<div class="text-center text-slate-600 mt-10 text-xs">// Kode masih kosong. Ketik perintah di panel sebelah kiri.</div>'; return; }
            let html = ''; let indent = 0; 
            app.currentGame.commands.forEach((cmd, idx) => {
                if (cmd === 'END_BLOCK') indent = Math.max(0, indent - 1);
                let text = '', color = 'text-blue-300'; let mLeft = indent * 20;
                if (cmd === 'MAJU') { text = 'move.forward();'; color = 'text-blue-300'; }
                else if (cmd === 'KIRI') { text = 'turn.left();'; color = 'text-purple-300'; }
                else if (cmd === 'KANAN') { text = 'turn.right();'; color = 'text-orange-300'; }
                else if (cmd === 'LOMPAT') { text = 'move.jump();'; color = 'text-cyan-300'; }
                else if (cmd === 'BLOCK_WHILE') { text = 'while (isPathClear()) {'; color = 'text-teal-400'; }
                else if (cmd === 'BLOCK_FOREVER') { text = 'while (true) {'; color = 'text-indigo-400'; }
                else if (cmd === 'BLOCK_IF') { text = 'if (isWallAhead()) {'; color = 'text-pink-400'; }
                else if (cmd === 'END_BLOCK') { text = '}'; color = 'text-slate-500'; }
                else if (cmd.startsWith('BLOCK_FOR_')) { text = `for (i=0; i<${cmd.split('_')[2]}; i++) {`; color = 'text-emerald-400'; }
                
                html += `
                <div class="flex items-center justify-between group p-1.5 rounded transition-colors" style="padding-left: ${mLeft}px" id="cmd-${idx}">
                    <div class="flex gap-3"><span class="text-slate-600 select-none w-4 text-right font-bold">${idx+1}</span><span class="${color}">${text}</span></div>
                    <button onclick="app.removeCommand(${idx})" class="text-red-500/0 group-hover:text-red-400 transition"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
                if (cmd.startsWith('BLOCK_')) indent++;
            });
            if (indent > 0) html += `<div class="text-red-400 text-xs mt-2 animate-pulse">// SyntaxError: Missing closing bracket '}'</div>`;
            list.innerHTML = html;
        };

        app.quitGame = function() { app.currentGame.isPlaying = false; app.changeView('student-dash'); };
        
        app.showHelp = function() {
            if (app.helpTokens <= 0) { Swal.fire({ icon: 'error', title: 'Token Habis!', text: 'Gunakan logikamu sendiri sekarang.' }); return; }
            Swal.fire({ title: 'Gunakan 1 Token Bantuan?', text: `Sisa token: ${app.helpTokens}`, icon: 'question', showCancelButton: true, confirmButtonColor: '#f59e0b', confirmButtonText: 'Decrypt (Buka)' })
            .then((r) => {
                if (r.isConfirmed) { app.helpTokens--; document.getElementById('help-count').innerText = app.helpTokens; Swal.fire({ title: '💡 Source Code', html: `<div class='text-left bg-slate-900 p-4 rounded text-emerald-400 font-mono-tech border border-slate-700'>${app.currentGame.level.solutionHint}</div>` }); }
            }).catch(err => console.error(err));
        };

        app.runCode = async function() {
            try {
                if (app.currentGame.isPlaying) return;
                if (app.currentGame.commands.length === 0) { Swal.fire('Error', 'Script kosong!', 'warning'); return; }
                const btn = document.getElementById('btn-run'); btn.innerHTML = '<i class="fa-solid fa-cog fa-spin"></i> EXECUTING...'; btn.classList.replace('bg-emerald-600', 'bg-amber-500');
                app.currentGame.isPlaying = true; app.currentGame.pos = { ...app.currentGame.level.start }; app.drawBoard();
                
                // Fokus otomatis ke layar Game Execution saat tombol ditekan
                document.getElementById('game-execution-area').scrollIntoView({behavior: 'smooth', block: 'start'});

                let cmds = [...app.currentGame.commands]; const lvl = app.currentGame.level; let isCrashed = false, isWin = false;
                let openB = cmds.filter(c => c.startsWith('BLOCK_')).length, closeB = cmds.filter(c => c === 'END_BLOCK').length;
                for(let i=0; i < (openB - closeB); i++) cmds.push('END_BLOCK');
                
                function buildAST(flat) {
                    let root = [], stack = [ { body: root, isRoot: true } ];
                    for (let i=0; i<flat.length; i++) {
                        let c = flat[i];
                        if (c.startsWith('BLOCK_')) { let n = { type: c, body: [], id: i }; stack[stack.length - 1].body.push(n); stack.push(n); } 
                        else if (c === 'END_BLOCK') { if (!stack[stack.length - 1].isRoot) stack.pop(); } 
                        else stack[stack.length - 1].body.push({ type: 'CMD', val: c, id: i });
                    } return root;
                }

                function checkSensorTembok() {
                    let nx = app.currentGame.pos.x, ny = app.currentGame.pos.y, d = app.currentGame.pos.dir;
                    if (d===0) ny--; else if (d===1) nx++; else if (d===2) ny++; else if (d===3) nx--;
                    return (nx<0 || nx>=lvl.grid || ny<0 || ny>=lvl.grid || lvl.obstacles.some(o => o.x===nx && o.y===ny));
                }

                async function executeTree(nodes) {
                    for (let node of nodes) {
                        if (!app.currentGame.isPlaying || isCrashed || isWin) return;
                        
                        document.querySelectorAll('[id^="cmd-"]').forEach(el => { el.classList.remove('script-active'); });
                        
                        const actEl = document.getElementById(`cmd-${node.id}`); 
                        if(actEl) {
                            actEl.classList.add('script-active');
                            actEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                        
                        if (node.type === 'CMD') {
                            let cmd = node.val;
                            if (cmd === 'KIRI') app.currentGame.pos.dir = (app.currentGame.pos.dir + 3) % 4;
                            else if (cmd === 'KANAN') app.currentGame.pos.dir = (app.currentGame.pos.dir + 1) % 4;
                            else if (cmd === 'MAJU') {
                                if (checkSensorTembok()) { isCrashed = true; return; } 
                                if (app.currentGame.pos.dir===0) app.currentGame.pos.y--; else if (app.currentGame.pos.dir===1) app.currentGame.pos.x++; else if (app.currentGame.pos.dir===2) app.currentGame.pos.y++; else app.currentGame.pos.x--;
                            }
                            else if (cmd === 'LOMPAT') {
                                let nx = app.currentGame.pos.x, ny = app.currentGame.pos.y, d = app.currentGame.pos.dir;
                                if (d===0) ny-=2; else if (d===1) nx+=2; else if (d===2) ny+=2; else nx-=2;
                                if (nx<0 || nx>=lvl.grid || ny<0 || ny>=lvl.grid || lvl.obstacles.some(o => o.x===nx && o.y===ny)) { isCrashed = true; return; }
                                app.currentGame.pos.x = nx; app.currentGame.pos.y = ny;
                            }
                            app.drawBoard(); 
                            if (app.currentGame.pos.x === lvl.target.x && app.currentGame.pos.y === lvl.target.y) { isWin = true; return; }
                            
                            await new Promise(r => setTimeout(r, 450));
                        }
                        else if (node.type.startsWith('BLOCK_FOR_')) { let t = parseInt(node.type.split('_')[2]); for (let i=0; i<t; i++) { if (!app.currentGame.isPlaying || isCrashed || isWin) return; await executeTree(node.body); } }
                        else if (node.type === 'BLOCK_FOREVER') { while (true) { if (!app.currentGame.isPlaying || isCrashed || isWin) return; await executeTree(node.body); await new Promise(r => setTimeout(r, 50)); } }
                        else if (node.type === 'BLOCK_WHILE') { let s=0; while (!checkSensorTembok() && s<100) { s++; if (!app.currentGame.isPlaying || isCrashed || isWin) return; await executeTree(node.body); await new Promise(r => setTimeout(r, 50)); } }
                        else if (node.type === 'BLOCK_IF') { if (checkSensorTembok()) await executeTree(node.body); }
                    }
                }

                await executeTree(buildAST(cmds));
                
                app.currentGame.isPlaying = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> COMPILE & RUN'; btn.classList.replace('bg-amber-500', 'bg-emerald-600'); app.renderCommands();

                if (isCrashed) { Swal.fire({ icon: 'error', title: 'FATAL ERROR', text: 'Robot menabrak objek padat / keluar map.' }); app.currentGame.pos = { ...app.currentGame.level.start }; app.drawBoard(); } 
                else if (isWin) {
                    let score = Math.max(10, 100 - (cmds.length * 5)); const nextLvl = app.levels.find(l => l.id === lvl.id + 1);
                    Swal.fire({ icon: 'success', title: 'MISSION ACCOMPLISHED', html: `Algoritma valid.<br>Score: <b class="text-amber-400">${score}</b>`, showCancelButton: true, confirmButtonText: nextLvl ? 'Next Level' : 'Finish', cancelButtonText: 'Map' }).then(async (r) => {
                        try {
                            Swal.fire({ title: 'Saving data...', didOpen: () => { Swal.showLoading() } }); 
                            await requestGAS('saveProgress', { username: app.user.username, level: lvl.id, skor: score }); 
                            Swal.close();
                            if (r.isConfirmed && nextLvl) app.startGame(nextLvl.id); else app.quitGame();
                        } catch(err) {
                            console.error(err); Swal.close(); app.quitGame();
                        }
                    }).catch(err => console.error(err));
                } else { Swal.fire({ icon: 'error', title: 'EXECUTION HALTED', text: 'Program selesai namun target tidak tercapai. (Atau terdeteksi Infinite Loop)' }); app.currentGame.pos = { ...app.currentGame.level.start }; app.drawBoard(); }
            } catch (globalError) {
                console.error("Execution Engine Error:", globalError);
                app.currentGame.isPlaying = false;
                app.currentGame.pos = { ...app.currentGame.level.start }; app.drawBoard(); app.renderCommands();
                const btn = document.getElementById('btn-run'); if(btn) { btn.innerHTML = '<i class="fa-solid fa-play"></i> COMPILE & RUN'; btn.classList.replace('bg-amber-500', 'bg-emerald-600'); }
                Swal.fire('Error', 'Sistem eksekusi mendadak berhenti.', 'error');
            }
        };

        window.onload = function() { app.renderApp(); };
    </script>
</body>
